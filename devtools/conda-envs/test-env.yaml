name: bespokefit-test

channels:
  - openeye
  - conda-forge

dependencies:

    # Base depends
  - python
  - pip
  # https://github.com/leeping/forcebalance/issues/307
  - setuptools<82

    ### Core dependencies.

  - numpy
  - pydantic
  - pyyaml
  - tqdm
  - rich
  - click
  - click-option-group
  - rdkit =2024.03.5
  - openff-utilities
  - openff-toolkit >=0.15
  - openff-forcefields >=2024.04.0
  - openff-units
  - openff-qcsubmit >=0.55
  - openmm >=7.6.0

    # Optional
  - forcebalance >=1.9.6
  - openff-fragmenter-base
  - xtb-python
  - openeye-toolkits

    ### Bespoke dependencies

  - qcportal >=0.53
  - qcelemental <0.50
  - qcengine <0.50
  - chemper
  - geometric =1
  - torsiondrive
  - pymbar

    # Executor
  - uvicorn
  - fastapi
  - starlette
  - celery
  - httpx
  - redis-server
  - redis-py <7.2

    ### Testing

  - pytest =7
  - pytest-cov
  - pytest-asyncio
  - requests-mock

